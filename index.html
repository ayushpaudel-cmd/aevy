.balloons {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 2;
  overflow: hidden;
}

.balloon {
  --size: 70px;

  position: absolute;
  bottom: -120px;

  width: var(--size);
  height: var(--size);

  background: linear-gradient(135deg, #ff4da6, #ff4da6);

  transform: rotate(-45deg);
  animation: floatUp 14s linear infinite;

  box-shadow: 0 10px 25px rgba(255, 77, 166, 0.35);
}

/* Heart circles */
.balloon::before,
.balloon::after {
  content: "";
  position: absolute;

  width: var(--size);
  height: var(--size);

  background: inherit;
  border-radius: 50%;
}

.balloon::before {
  top: calc(var(--size) * -0.5);
  left: 0;
}

.balloon::after {
  left: calc(var(--size) * 0.5);
  top: 0;
}

/* String */
.balloon .string {
  position: absolute;
  left: 50%;
  top: calc(var(--size) * 0.9);

  width: 2px;
  height: 60px;

  background: rgba(255,255,255,0.8);

  transform: translateX(-50%) rotate(45deg);
}

/* Different balloon sizes */
.balloon.b2 {
  --size: 60px;
  background: linear-gradient(135deg, #ff8a00, #ff8a00);
  animation-duration: 18s;
  animation-delay: -6s;
}

.balloon.b3 {
  --size: 85px;
  background: linear-gradient(135deg, #36c2ff, #36c2ff);
  animation-duration: 20s;
  animation-delay: -10s;
}

.balloon.b4 {
  --size: 65px;
  background: linear-gradient(135deg, #5bd74f, #5bd74f);
  animation-duration: 16s;
  animation-delay: -4s;
}

@keyframes floatUp {
  0% {
    transform: translateY(0) rotate(-45deg);
    opacity: 0.95;
  }

  100% {
    transform: translateY(-120vh) translateX(40px) rotate(-38deg);
    opacity: 0.25;
  }
}

<script>
  let animationStarted = false;
  const btn = document.getElementById("musicBtn");
  const audio = document.getElementById("bgAudio");
  const audioSrc = "./audio/thaamana_haat.mp3";
  let audioLoaded = false;

  async function loadAudio() {
    if (audioLoaded) return;
    try {
      const response = await fetch(audioSrc);
      const blob = await response.blob();
      audio.src = URL.createObjectURL(blob);
      audioLoaded = true;
    } catch (err) {
      console.log("Audio load error:", err);
    }
  }

  btn.addEventListener("click", async function () {
    await loadAudio();
    audio.volume = 0.5;
    audio.play().catch((err) => {
      console.log("Audio play error:", err);
    });
    btn.classList.add("hidden");
    if (!animationStarted) {
      animationStarted = true;
      animate();
    }
  });
class Orbit {
    constructor(target, dumping = 10, from = { x: 0, y: 0 }, to = { x: 0, y: 0 }) {
        this.__target = target;
        this.dumping = dumping;

        this.desire_rotateZ = -to.y;
        this.desire_rotateX = -to.x;

        this.rz = from.y;
        this.rx = from.x;

        this.isDragging = false;
        this.previousMousePosition = { x: 0, y: 0 };

        this.behaviours();
    }

    behaviours() {

        $(document).on("mousedown touchstart", (e) => {

            this.isDragging = true;

            let event =
                e.type === "touchstart"
                    ? e.originalEvent.touches[0]
                    : e;

            this.previousMousePosition = {
                x: event.pageX,
                y: event.pageY
            };
        });

        $(document).on("mouseup touchend", () => {
            this.isDragging = false;
        });

        $(document).on("mousemove touchmove", (e) => {

            if (this.isDragging) {

                let event =
                    e.type === "touchmove"
                        ? e.originalEvent.touches[0]
                        : e;

                let deltaMove = {
                    x: event.pageX - this.previousMousePosition.x,
                    y: event.pageY - this.previousMousePosition.y
                };

                this.desire_rotateZ += deltaMove.x;
                this.desire_rotateX += deltaMove.y;

                this.previousMousePosition = {
                    x: event.pageX,
                    y: event.pageY
                };

                if (e.type === "touchmove") {
                    e.preventDefault();
                }
            }
        });

        window.requestAnimationFrame(this.update.bind(this));
    }

    update() {

        this.rz += (
            ((this.desire_rotateZ * -1) - this.rz) / this.dumping
        );

        this.rx += (
            ((this.desire_rotateX * -1) - this.rx) / this.dumping
        );

        this.__target.css({
            "transform":
          "translate(-50%, -50%) translateZ(-300px) " +
                "rotateX(" + this.rx + "deg) " +
                "rotateZ(" + this.rz + "deg)"
        });

        window.requestAnimationFrame(this.update.bind(this));
    }
}
